name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정   # 🔥 여기 수정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven 빌드
        working-directory: backend
        run: ./mvnw clean package -DskipTests

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정   # 🔥 18 → 20 추천
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        working-directory: frontend
        run: npm install

      - name: build
        working-directory: frontend
        run: npm run build